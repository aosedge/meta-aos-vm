{
    "caCert": "/etc/ssl/certs/Aos_Root_CA.pem",
    "certStorage": "iam",
    "mainIamPublicServerUrl": "main:8090",
    "mainIamProtectedServerUrl": "main:8089",
    "iamProtectedServerUrl": ":8089",
    "iamPublicServerUrl": ":8090",
    "workingDir": "/var/aos/iam",
    "nodeInfo": {
        "nodeIdPath": "/etc/machine-id",
        "nodeName": "secondary",
        "maxDmips": 10000,
        "attrs": {
            "AosComponents": "iam,sm"
        },
        "partitions": [
            {
                "name": "workdirs",
                "types": [
                    "services",
                    "layers",
                    "generic"
                ],
                "path": "/var/aos/workdirs"
            },
            {
                "name": "var",
                "types": [
                    "generic"
                ],
                "path": "/var"
            }
        ]
    },
    "diskEncryptionCmdArgs": [
        "/bin/sh",
        "-c",
        "/opt/aos/setupdisk.sh create $(cat /proc/cmdline | sed -e 's/^.*opendisk.target=//' -e 's/ .*$//') -m /usr/lib/softhsm/libsofthsm2.so -p $(cat /var/aos/iam/.usrpin) 2>&1 | systemd-cat"
    ],
    "finishProvisioningCmdArgs": [
        "/opt/aos/provfinish.sh"
    ],
    "deprovisionCmdArgs": [
        "/opt/aos/deprovision.sh",
        "async"
    ],
    "certModules": [
        {
            "id": "iam",
            "plugin": "pkcs11module",
            "algorithm": "ecc",
            "maxItems": 2,
            "extendedKeyUsage": [
                "serverAuth",
                "clientAuth"
            ],
            "params": {
                "library": "/usr/lib/softhsm/libsofthsm2.so",
                "tokenLabel": "aoscore",
                "userPinPath": "/var/aos/iam/.usrpin",
                "modulePathInUrl": true
            }
        },
        {
            "id": "sm",
            "plugin": "pkcs11module",
            "algorithm": "ecc",
            "maxItems": 2,
            "extendedKeyUsage": [
                "clientAuth"
            ],
            "params": {
                "library": "/usr/lib/softhsm/libsofthsm2.so",
                "tokenLabel": "aoscore",
                "userPinPath": "/var/aos/iam/.usrpin",
                "modulePathInUrl": true
            }
        },
        {
            "id": "diskencryption",
            "plugin": "pkcs11module",
            "algorithm": "rsa",
            "maxItems": 1,
            "disabled": false,
            "selfSigned": true,
            "params": {
                "library": "/usr/lib/softhsm/libsofthsm2.so",
                "tokenLabel": "aoscore",
                "userPinPath": "/var/aos/iam/.usrpin",
                "modulePathInUrl": true
            }
        }
    ],
    "migration": {
        "migrationPath": "/usr/share/aos/iam/migration",
        "mergedMigrationPath": "/var/aos/iam/migration"
    }
}
