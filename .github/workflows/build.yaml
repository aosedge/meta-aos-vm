name: Aos virtual machine build
on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      release_date: ${{ steps.version.outputs.release_date }}

    steps:
      - name: Set release version
        id: version
        run: |
          tag=$(basename "${{ github.ref }}")
          version=${tag#"v"}
          release_date="$(date -I)"

          echo "Release tag:     $tag"
          echo "Release version: $version"
          echo "Release date:    $release_date"

          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "release_date=$release_date" >> $GITHUB_OUTPUT

      - name: Draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

        run: |
          tag="${{ steps.version.outputs.tag }}"
          version="${{ steps.version.outputs.version }}"

          gh release create --draft "$tag" --title "Version $version"

  build:
    name: Build
    runs-on: github-arc-x64-dind
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        # The list of supported machines:
        # genericx86-64, qemux86-64, genericarm64, qemuarm64
        machine: [genericx86-64, qemux86-64, qemuarm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: aosedge/meta-aos-vm
          fetch-depth: 0

      - name: Install gh
        uses: ./.github/workflows/common

      - name: Build
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag="${{needs.prepare.outputs.tag }}"
          version="${{ needs.prepare.outputs.version }}"
          prev_tag=$(git describe --tags --abbrev=0 "${tag}"^ || true)
          prev_version=${prev_tag#"v"}
          machine="${{ matrix.machine }}"

          echo "Current version:  $version"
          echo "Previous version: $prev_version"
          echo "Machine:          $machine"

          mkdir build
          cp aos-vm.yaml build/

          sed -i "s/BUNDLE_IMAGE_VERSION: \"[^\"]*\"/BUNDLE_IMAGE_VERSION: \"$version\"/" build/aos-vm.yaml
          sed -i "s/ROOTFS_REF_VERSION: \"[^\"]*\"/ROOTFS_REF_VERSION: \"$prev_version\"/" build/aos-vm.yaml

          # Configure git credentials inside the workspace for docker containers
          git config -f build/.gitconfig url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          chmod 600 build/.gitconfig

          docker/build_docker.sh -f docker/Dockerfile

          # Debug: verify git config is visible inside container
          docker/run_docker.sh -n -w build -- sh -c "echo HOME=\$HOME; cat /etc/gitconfig 2>&1; echo '---CURL TEST---'; curl -s -o /dev/null -w '%{http_code}' 'https://github.com/aosedge/meta-aos/info/refs?service=git-upload-pack'; echo; echo '---GIT CLONE TEST---'; git clone --no-checkout -q https://github.com/aosedge/meta-aos /tmp/test-clone 2>&1; echo EXIT=\$?"

          echo "Build main node artifacts"

          docker/run_docker.sh -n -w build -- moulin aos-vm.yaml --NODE_TYPE=main --MACHINE="$machine" \
            --CACHE_LOCATION=inside

          docker/run_docker.sh -n -w build -- ninja "main-${machine}.img"
          docker/run_docker.sh -n -w build -- ninja layers
          docker/run_docker.sh -n -w build -- ninja fota

          if [ -d build/output/fota ]; then
            echo "Archive main node components"
            (cd build && tar -czf "output/aos-vm-fota-main-${machine}-${version}.tar.gz" -C output fota)
          fi

          docker/run_docker.sh -n -w build -- moulin aos-vm.yaml --NODE_TYPE=main --MACHINE="$machine" \
            --WITH_MESSAGE_PROXY=yes --CACHE_LOCATION=inside

          docker/run_docker.sh -n -w build -- ninja aos-sdk

          echo "Build secondary node artifacts"

          docker/run_docker.sh -n -w build -- moulin aos-vm.yaml --NODE_TYPE=secondary --MACHINE="$machine" \
            --CACHE_LOCATION=inside
          docker/run_docker.sh -n -w build -- ninja "secondary-${machine}.img"
          docker/run_docker.sh -n -w build -- ninja fota

          if [ -d build/output/fota ]; then
            echo "Archive secondary node components"
            (cd build && tar -czf "output/aos-vm-fota-secondary-${machine}-${version}.tar.gz" -C output fota)
          fi

          echo "Archive image"

          sudo apt-get install -y xz-utils qemu-utils

          cd build

          if [[ $machine == "qemu"* ]]; then
              disk_format="qcow2"
          else
              disk_format="vmdk"
          fi

          yocto/meta-aos-vm/scripts/aos_vm.sh archive -m -s 1 --machine "$machine" -d "$disk_format" -c xz \
            -o output/image -f "aos-vm-image-${machine}-${version}"

          if [ -d output/layers ]; then
            echo "Archive layers"

            tar -czf "output/aos-vm-layers-${machine}-${version}.tar.gz" -C output layers
          fi

      - name: Deploy
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

        run: |
          tag="${{needs.prepare.outputs.tag }}"
          version="${{ needs.prepare.outputs.version }}"
          machine="${{ matrix.machine }}"

          echo "Deploy artifacts"

          for file in build/output/image/*; do
            gh release upload "$tag" "$file"
          done


          if [ -f "build/output/aos-vm-layers-${machine}-${version}.tar.gz" ]; then
            gh release upload "$tag" "build/output/aos-vm-layers-${machine}-${version}.tar.gz"
          fi

          if [ -f "build/output/aos-vm-fota-main-${machine}-${version}.tar.gz" ]; then
            gh release upload "$tag" "build/output/aos-vm-fota-main-${machine}-${version}.tar.gz"
          fi

          if [ -f "build/output/aos-vm-fota-secondary-${machine}-${version}.tar.gz" ]; then
            gh release upload "$tag" "build/output/aos-vm-fota-secondary-${machine}-${version}.tar.gz"
          fi

          for file in build/output/sdk/*.sh; do
            gh release upload "$tag" "$file"
          done

          if [ "$machine" = "genericx86-64" ]; then
            gh release upload "$tag" scripts/aos_vm.sh
            gh release upload "$tag" misc/unitconfig.json
          fi

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Release
        run: |
          tag="${{needs.prepare.outputs.tag }}"
          version="${{ needs.prepare.outputs.version }}"

          echo "Release version: $version"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            gh release edit "$tag" --prerelease
          fi

          gh release edit "$tag" --draft=false

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: ${{ always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Cleanup
        run: |
          tag="${{needs.prepare.outputs.tag }}"
          version="${{ needs.prepare.outputs.version }}"

          echo "Cleanup version: $version"

          gh release delete "$tag" -y
